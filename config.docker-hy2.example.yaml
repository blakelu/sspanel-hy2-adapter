# 复制为 config.docker-hy2.yaml。该配置用于 Adapter 与 HY2 都运行在本 Compose 中的场景。
server:
  # 必须监听容器网卡，hysteria 容器才能通过 adapter:8080 访问。
  listen: 0.0.0.0:8080
  auth_path: /auth
  auth_token: ${ADAPTER_AUTH_TOKEN}
  read_timeout: 5s
  # 管理接口在切换端口前会串行采集 HY2 stats 并上报面板，需覆盖两次后端请求。
  write_timeout: 15s

panel:
  base_url: ${SSPANEL_BASE_URL}
  key: ${SSPANEL_MU_KEY}
  node_id: ${SSPANEL_NODE_ID}
  timeout: 5s
  heartbeat_interval: 60s
  insecure_skip_verify: false

user_source:
  mode: api
  credential_fields:
    - uuid
  api:
    refresh_interval: 30s
    max_stale: 5m
  database:
    dsn: ${SSPANEL_DB_USER}:${SSPANEL_DB_PASSWORD}@tcp(${SSPANEL_DB_HOST}:3306)/${SSPANEL_DB_NAME}?charset=utf8mb4&parseTime=true&loc=Local
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 5m

hy2:
  # 使用 Compose 服务名访问独立 HY2，不能写 127.0.0.1。
  stats_url: http://hysteria:9999
  stats_secret: ${HY2_STATS_SECRET}
  timeout: 5s
  poll_interval: 60s
  state_file: ./data/traffic-state.json
  run_on_startup: true

log:
  level: info
