# 复制为 hysteria.docker.yaml，然后替换所有 REPLACE_* 值。
# 这里的密钥必须写入实际值；Hysteria 不使用 Adapter 的配置展开逻辑。
listen: :8443

acme:
  # Hysteria 会在后台定期检查并自动续期，ACME 数据由 Compose 持久化到 /acme。
  domains:
    - REPLACE_DOMAIN
  email: REPLACE_ACME_EMAIL
  ca: letsencrypt
  type: dns
  dns:
    name: cloudflare
    config:
      # Token 建议仅授予目标 Zone 的 Zone:Read 和 DNS:Edit 权限。
      cloudflare_api_token: REPLACE_CLOUDFLARE_API_TOKEN

auth:
  type: http
  http:
    # 使用 Compose 服务名访问 Adapter，不能写 127.0.0.1。
    url: http://adapter:8080/auth?token=REPLACE_ADAPTER_AUTH_TOKEN
    insecure: false

trafficStats:
  # 只在 Docker 内部网络监听；宿主机调试端口由 Compose 映射到 127.0.0.1。
  listen: :9999
  secret: REPLACE_HY2_STATS_SECRET

masquerade:
  type: proxy
  proxy:
    url: https://www.bing.com/
    rewriteHost: true
