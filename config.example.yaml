# 配置文件支持 ${ENV_NAME} 环境变量展开。密钥建议全部通过环境变量注入。
server:
  # HY2 与适配器同机运行时只监听回环地址。
  listen: 127.0.0.1:8080
  auth_path: /auth
  # HY2 HTTP Auth 不支持自定义 Header，因此通常放在 URL 的 token 查询参数中。
  # 留空表示不校验 token，仅建议在严格隔离的回环网络中使用。
  auth_token: ${ADAPTER_AUTH_TOKEN}
  read_timeout: 5s
  write_timeout: 5s

panel:
  # 必须与 SSPanel-UIM 的 webAPIUrl 主机和协议一致，不要带结尾斜杠。
  base_url: ${SSPANEL_BASE_URL}
  key: ${SSPANEL_MU_KEY}
  node_id: 1
  timeout: 5s
  # database 认证模式用该周期调用用户接口，以维持 SSPanel 节点心跳；API 模式由用户同步自然维持。
  heartbeat_interval: 60s
  insecure_skip_verify: false

user_source:
  # api：定时同步 /mod_mu/users；database：每次认证实时查询 MySQL/MariaDB。
  mode: api

  # 推荐 uuid。API 模式仅支持 uuid、passwd；数据库模式还支持 email、user_name。
  # 多字段采用“任一匹配”，同一凭据匹配多个用户时会拒绝认证。
  credential_fields:
    - uuid

  api:
    refresh_interval: 30s
    # 超过该时间仍无法成功刷新时停止认证，避免长期使用过期权限。
    max_stale: 5m

  database:
    # 仅 database 模式使用。parseTime 不是必需，但便于统一运维配置。
    dsn: ${SSPANEL_DB_USER}:${SSPANEL_DB_PASSWORD}@tcp(${SSPANEL_DB_HOST}:3306)/${SSPANEL_DB_NAME}?charset=utf8mb4&parseTime=true&loc=Local
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 5m

hy2:
  stats_url: http://127.0.0.1:9999
  stats_secret: ${HY2_STATS_SECRET}
  timeout: 5s
  poll_interval: 60s
  # 必须放在持久化磁盘上；不要让多个适配器实例共用同一个 HY2 stats API。
  state_file: ./data/traffic-state.json
  run_on_startup: true

log:
  level: info
