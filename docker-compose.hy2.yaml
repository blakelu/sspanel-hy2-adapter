services:
  adapter:
    build:
      context: .
      args:
        VERSION: local
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${ADAPTER_DEBUG_PORT:-18080}:8080/tcp"
    volumes:
      - ./config.docker-hy2.yaml:/etc/sspanel-hy2-adapter/config.yaml:ro
      - adapter-state:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks:
      - hy2-internal

  hysteria:
    image: tobyxdd/hysteria:latest
    restart: unless-stopped
    command: ["server", "-c", "/etc/hysteria.yaml"]
    environment:
      HYSTERIA_ACME_DIR: /acme
    depends_on:
      adapter:
        condition: service_healthy
    ports:
      - "${HY2_PUBLIC_PORT:-8443}:8443/udp"
      - "127.0.0.1:${HY2_STATS_DEBUG_PORT:-19999}:9999/tcp"
    volumes:
      - ./hysteria.docker.yaml:/etc/hysteria.yaml:ro
      - hysteria-acme:/acme
    security_opt:
      - no-new-privileges:true
    networks:
      - hy2-internal

  port-sync:
    build:
      context: .
      dockerfile: Dockerfile.port-sync
    restart: unless-stopped
    depends_on:
      adapter:
        condition: service_healthy
    environment:
      PROJECT_DIR: ${HOST_PROJECT_DIR:?set HOST_PROJECT_DIR in .env}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-sspanel-hy2-adapter}
      PORT_SYNC_INTERVAL: ${PORT_SYNC_INTERVAL:-30}
    working_dir: ${HOST_PROJECT_DIR:?set HOST_PROJECT_DIR in .env}
    network_mode: host
    volumes:
      # 需要控制宿主机 Docker 才能使用新端口重建 hysteria。
      - /var/run/docker.sock:/var/run/docker.sock
      # 必须以相同绝对路径挂载，嵌套 Compose 才能正确解析绑定挂载。
      - ${HOST_PROJECT_DIR:?set HOST_PROJECT_DIR in .env}:${HOST_PROJECT_DIR:?set HOST_PROJECT_DIR in .env}
    security_opt:
      - no-new-privileges:true

networks:
  hy2-internal:
    driver: bridge

volumes:
  adapter-state:
  hysteria-acme:
